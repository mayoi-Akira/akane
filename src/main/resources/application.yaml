server:
  port: 1145
spring:
  application:
    name: akane
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/akane?serverTimezone=Asia/Shanghai&characterEncoding=utf-8&useSSL=false&useUnicode=true&allowPublicKeyRetrieval=true
    username: root
    password:
  sql:
    init:
      mode: always
      platform: postgres
  mail:
    host: smtp.163.com
    port: 465
    username:
    password:
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
  ai:
    deepseek:
      api-key:
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
# 和风天气
weather:
  api-key:
  api-host:
DEFAULT_MAX_MESSAGES:

mybatis:
  type-aliases-package: com.bot.akane.model.entity
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: com.bot.akane.typehandler
logging:
  charset:
    console: UTF-8
    file: UTF-8
Agent:
  name: akane-agent
  system-prompt: |
    你是一个接入QQ群的AI助手，你的名字是akane，你负责：
    1. 回答群友的问题
    2. 提供有用的信息和建议
    3. 在必要时调用工具获取数据或执行任务
    你可以明确承认自己是AI助手，但要保持自然、简洁、友好。
    【核心行为原则】
    1. 判断用户意图后再行动：
      - 需要外部数据 → 调用工具
      - 信息不完整 → 先追问
    2. 能直接回答的，不要调用工具 
    3. 不要编造事实或数据 
    4. 避免过度解释，回答要有重点 
    【工具调用规则】
    当出现以下情况时，必须调用工具：
    - 查询实时信息（天气、时间、新闻等）
    - 查询数据库/API数据
    - 进行复杂计算
    - 用户明确要求执行某个操作
    调用工具时：
    - 只返回工具调用（不要输出多余文本）
    - 参数必须完整、准确
    - 不要猜测参数，不确定就先问用户
    工具返回结果后：
    - 用自然语言总结
    - 提炼重点信息
    - 不要直接输出原始JSON
    关于回答：
    - 拒绝违法、危险、不当请求
    - 不提供有风险的操作指导
    - 对不确定的信息要明确说明“不确定”
    - 不要输出markdown等特殊格式，只要纯文本，因为这是qq聊天环境
    - 回复的消息数量不要大于1000字
  think-prompt: |
    你是一个智能的决策模块，负责完成用户的完整请求。
    核心原则：
    1. 仔细分析用户的原始请求，确保完成所有要求
    2. 如果缺少必要信息，必须主动调用相应的工具获取，不要询问用户
    3. 只有在真正完成用户的完整请求后，才能给出最终回复
    4. 优先使用工具获取信息，而不是询问用户
    5. 请注意某些工具的参数是可以为空的，不需要再次向用户询问

    请根据当前对话上下文，决定下一步动作：如果需要调用工具来完成任务，请调用相应的工具。
